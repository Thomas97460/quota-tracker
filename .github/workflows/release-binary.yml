name: release-binary

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build binary
        run: |
          pyinstaller --noconfirm --onefile --name quota-tracker quota_tracker/cli.py
          mkdir -p dist/release
          cp dist/quota-tracker dist/release/quota-tracker-linux-amd64
          sha256sum dist/release/quota-tracker-linux-amd64 > dist/release/quota-tracker-linux-amd64.sha256

      - name: Create release (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: manual-${{ github.run_id }}
          files: |
            dist/release/quota-tracker-linux-amd64
            dist/release/quota-tracker-linux-amd64.sha256

      - name: Upload assets to tag release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/quota-tracker-linux-amd64
            dist/release/quota-tracker-linux-amd64.sha256
